<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zendra Auth</title>
  <link rel="stylesheet" href="src/style.css" />
  <style>
    body {
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      width: min(440px, 100%);
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
    }

    .auth-card h1 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #fff;
    }

    .auth-card .toggle-links {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .auth-card .toggle-links button {
      flex: 1;
      background: transparent;
      border: 1px solid #1e293b;
      color: #cbd5e1;
      border-radius: 12px;
    }

    .auth-card .toggle-links button.active,
    .auth-card .toggle-links button:hover {
      background: #0f172a;
      color: #fff;
    }

    .auth-card .hidden {
      display: none;
    }

    .auth-card p {
      margin-top: 16px;
      font-size: 14px;
      color: #94a3b8;
    }

    .auth-card a {
      color: #60a5fa;
      text-decoration: none;
    }

    #authMsg {
      margin-top: 18px;
      min-height: 22px;
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="toggle-links">
      <button id="btnSignup" class="active" type="button" onclick="showSignup()">Create account</button>
      <button id="btnLogin" type="button" onclick="showLogin()">Login</button>
    </div>

    <div id="signupBox">
      <h1>Create your account</h1>
      <input id="signupEmail" type="email" placeholder="Email Address" />
      <input id="signupPassword" type="password" placeholder="Password" />
      <button type="button" onclick="signup()">Create account</button>
      <p>Already have an account? <a href="#" onclick="showLogin(); return false;">Login</a></p>
    </div>

    <div id="loginBox" class="hidden">
      <h1>Welcome back</h1>
      <input id="loginEmail" type="email" placeholder="Email Address" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <button type="button" onclick="login()">Login</button>
      <p>Don't have an account? <a href="#" onclick="showSignup(); return false;">Sign up</a></p>
    </div>

    <p id="authMsg"></p>
  </div>

  <script>
    if (localStorage.getItem("loggedIn") === "true") {
      window.location.href = "index.html";
    }
  </script>
  <script src="auth.js"></script>
</body>
</html>
